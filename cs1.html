<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NOIR Studio</title><link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet"><style>
*{margin:0;padding:0;box-sizing:border-box}

body{
  background:#000;
  color:#f0ece0;
  font-family:'Inter',sans-serif;
}

h1,h2,h3{
  font-family:'Cormorant Garamond',serif;
  letter-spacing:1px;
}

.container{
  width:90%;
  max-width:1200px;
  margin:auto;
}

/* HERO */
.hero{
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  background:linear-gradient(rgba(0,0,0,0.7),rgba(0,0,0,0.9)), url('https://images.unsplash.com/photo-1520975922322-0360e6c7c8a2');
  background-size:cover;
  background-position:center;
}

.hero h1{
  font-size:70px;
}

.hero p{
  margin-top:20px;
  font-size:18px;
  color:#c9a84c;
}

.btn{
  margin-top:30px;
  padding:12px 30px;
  border:1px solid #c9a84c;
  color:#c9a84c;
  text-decoration:none;
  transition:0.3s;
}

.btn:hover{
  background:#c9a84c;
  color:#000;
}

/* SERVICES */
.services{
  padding:80px 0;
}

.cards{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:30px;
}

.card{
  padding:30px;
  border:1px solid rgba(201,168,76,0.2);
  transition:0.4s;
}

.card:hover{
  transform:translateY(-10px);
  border-color:#c9a84c;
}

.card h3{
  margin-bottom:15px;
  color:#c9a84c;
}

/* TESTIMONIAL */
.testimonial{
  padding:80px 0;
  text-align:center;
  background:#0a0a0a;
}

.testimonial p{
  font-size:20px;
  font-style:italic;
}

.testimonial span{
  display:block;
  margin-top:20px;
  color:#c9a84c;
}

/* CTA */
.cta{
  padding:80px 0;
  text-align:center;
}

.cta h2{
  font-size:40px;
}

/* ANIMATION */
.fade-in{
  opacity:0;
  transform:translateY(20px);
  transition:1s ease;
}

.fade-in.show{
  opacity:1;
  transform:translateY(0);
}

</style></head><body><section class="hero">
  <div class="container fade-in">
    <h1>NOIR Studio</h1>
    <p>Timeless Elegance. Modern Masculinity.</p>
    <a href="#" class="btn">Book Your Style</a>
  </div>
</section><section class="services container">
  <div class="cards"><div class="card fade-in">
  <h3>Custom Tailoring</h3>
  <p>Precision-crafted garments tailored to your exact measurements and lifestyle.</p>
</div>

<div class="card fade-in">
  <h3>Luxury Fabrics</h3>
  <p>Only the finest materials sourced globally for unmatched quality and comfort.</p>
  </div>
